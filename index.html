<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <main>
      <h1>Buscar CEP</h1>
      <section class="search-box">
        <label for="cepInput" class="sr-only">Digite o CEP:</label>
        <input
          type="text"
          id="cepInput"
          placeholder="Ex: 01001000"
          maxlength="8"
        />
        <button id="buscar">Buscar</button>
      </section>
      <article id="resultado" class="hidden"></article>
    </main>
  </body>
</html>
